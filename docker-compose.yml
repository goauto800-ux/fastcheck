version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: fast-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - fast-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fast-backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017/fast_checker
    depends_on:
      - mongodb
    networks:
      - fast-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=
    container_name: fast-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - fast-network

volumes:
  mongo_data:

networks:
  fast-network:
    driver: bridge
