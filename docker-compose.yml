version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: fast-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - fast-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fast-backend
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017/fast_checker
      - DB_NAME=fast_checker
      - CORS_ORIGINS=*
    depends_on:
      - mongodb
    ports:
      - "0.0.0.0:8001:8001"
    networks:
      - fast-network
    volumes:
      - job_results:/tmp/fast_jobs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://62.171.181.238:8001
    container_name: fast-frontend
    restart: always
    ports:
      - "0.0.0.0:3000:80"
    depends_on:
      - backend
    networks:
      - fast-network

volumes:
  mongo_data:
  job_results:

networks:
  fast-network:
    driver: bridge
